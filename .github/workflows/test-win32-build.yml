name=.github/workflows/test-win32-build.yml url=https://github.com/vrtulka23/scinumtools3/blob/main/.github/workflows/test-win32-build.yml
name: Test Windows 32-bit Build

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:  # Allows manual trigger

jobs:
  test_windows_32bit:
    name: Test Windows 32-bit Python 3.11
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x86"  # This forces 32-bit Python

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: win32  # 32-bit architecture

      - name: Build wheel with cibuildwheel
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD: cp311-win32
          CIBW_BUILD_VERBOSITY: 1

      - name: Test import
        run: |
          python -c "import scinumtools3; print('Success!')"
