name: Test Windows 32-bit Build

on:
  push:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test_windows_32bit:
    name: Test Windows 32-bit Python 3.11
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          architecture: "x86"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: win32

      - name: Build and test wheel with cibuildwheel
        uses: pypa/cibuildwheel@v3
        env:
          CIBW_BUILD: cp311-win32
          CIBW_BUILD_VERBOSITY: 1
          CIBW_TEST_COMMAND: python -c "import scinumtools3; print('Success!')"
