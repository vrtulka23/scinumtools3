name: Wheels

on:
  release:
    types: [published]

jobs:
  build_wheels:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pypa/cibuildwheel@v2.23

      - uses: actions/upload-artifact@v4
        with:
          path: wheelhouse/*.whl

  publish:
    needs: build_wheels

    runs-on: ubuntu-latest

    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4

      - uses: pypa/gh-action-pypi-publish@release/v1
