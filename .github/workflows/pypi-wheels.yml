name: Build and Publish on PyPI

on:
  release:
    types: [published]

jobs:
  build_wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Only used for helper commands below.
      # cibuildwheel uses its own Python installations.
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev pybind11-dev

      - name: macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install googletest pybind11

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_ARCHS_WINDOWS: "AMD64 x86"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28  # to enforce GCC 11+
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28
          CIBW_TEST_COMMAND: python -c "import scinumtools3; print('Success!')"
          CMAKE_ARGS: >-
            -DENABLE_UNIT_TESTS=OFF
            -DENABLE_EXEC_APPS=OFF
            -DENABLE_EXEC_EXAMPLES=OFF
            -DENABLE_EXEC_BENCHMARKS=OFF
          
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  build_sdist:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    needs:
      - build_wheels
      - build_sdist

    runs-on: ubuntu-latest

    permissions:
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifact directories
        run: |
          mkdir upload
          find dist -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} upload/ \;

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: upload
