name: Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'bindings/**'
      - 'benchmarks/**'
      - 'examples/**'
      - 'apps/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'pyproject.toml'
      - '.github/workflows/c-cpp-build.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'bindings/**'
      - 'benchmarks/**'
      - 'examples/**'
      - 'apps/**'
      - 'tests/**'
      - 'CMakeLists.txt'
      - 'pyproject.toml'
      - '.github/workflows/c-cpp-build.yml'

jobs:
  build:
    strategy:
      matrix:
        os: 
          - ubuntu-latest
          - macos-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ".[test]"
          
      - name: Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev pybind11-dev
          
      - name: macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install googletest pybind11

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./setup.sh --github-workflows -b

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./setup.sh --github-workflows -b

      - name: Test (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./setup.sh -t

      - name: Test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: ./setup.sh -t
        
