name: Linux Build

on:
  push:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'bindings/**'
      - 'benchmarks/**'
      - 'examples/**'
      - 'apps/**'
      - 'tests/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'bindings/**'
      - 'benchmarks/**'
      - 'examples/**'
      - 'apps/**'
      - 'tests/**'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtest-dev pybind11-dev
          
      - name: Build
        run: ./setup.sh --github-workflows -b

      - name: Test
        run: ./setup.sh -t

